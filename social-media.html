<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodingHub - Social Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #030712;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        .text-glow {
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }
        
        .social-card {
            transition: all 0.3s ease;
        }
        .social-card:hover {
            transform: translateY(-5px);
            border-color: rgba(14, 165, 233, 0.4);
            box-shadow: 0 15px 30px -10px rgba(14, 165, 233, 0.15);
        }
    </style>
</head>
<body>

    <header class="border-b border-gray-800 bg-[#030712]/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 font-bold text-xl text-white">
                <div class="bg-sky-500 text-white p-1.5 rounded-lg text-sm">
                    <i class="fas fa-code"></i>
                </div>
                Coding<span class="text-sky-400">Hub</span>
            </div>
            
            <nav class="hidden md:flex items-center gap-4 text-sm text-gray-400">
                <a href="index.html" id="nav-home" class="hover:text-white transition px-3 py-1.5 rounded-full">Home</a>
                <a href="activities.html" id="nav-gallery" class="hover:text-white transition px-3 py-1.5 rounded-full">Activities</a>
                <a href="social-media.html" id="nav-social" class="bg-sky-950/50 text-sky-400 px-3 py-1.5 rounded-full font-medium">Social Media</a>
            </nav>

            <button onclick="toggleMobileMenu()" class="md:hidden text-gray-400 hover:text-white text-xl focus:outline-none">
                <i id="menu-icon" class="fas fa-bars"></i>
            </button>
        </div>

        <div id="mobileMenu" class="hidden md:hidden border-t border-gray-800 bg-[#030712]/95 px-4 py-4 space-y-3">
            <a href="index.html" class="block text-gray-400 hover:text-white hover:bg-slate-900 px-4 py-2 rounded-xl text-sm transition">Home</a>
            <a href="activities.html" class="block text-gray-400 hover:text-white hover:bg-slate-900 px-4 py-2 rounded-xl text-sm transition">Activities</a>
            <a href="social-media.html" class="block bg-sky-950/50 text-sky-400 px-4 py-2 rounded-xl text-sm font-medium">Social Media</a>
        </div>
    </header>

    <section class="max-w-6xl mx-auto px-4 py-20 text-center">
        <span class="text-xs font-bold tracking-widest text-sky-500 uppercase block mb-3">Stay Connected</span>
        
        <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-6 text-glow">
            Find us <span class="text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-blue-500">everywhere</span> online.
        </h1>
        
        <div class="flex flex-col gap-5 max-w-xl mx-auto text-left mt-12">
            
            <a href="https://www.linkedin.com/in/coding-hub-78aaa6400?utm_source=share_via&utm_content=profile&utm_medium=member_android" target="_blank" class="social-card block bg-slate-950/50 border border-slate-900 p-5 rounded-2xl flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-blue-600 flex items-center justify-center text-white text-xl shrink-0">
                        <i class="fab fa-linkedin-in"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg text-white leading-tight">LinkedIn</h3>
                        <p class="text-sky-400 text-xs mt-0.5">@codinghub</p>
                    </div>
                </div>
                <span class="text-sky-400 flex items-center gap-1 text-xs font-medium">
                    Visit <i class="fas fa-arrow-up-right-from-square text-[10px]"></i>
                </span>
            </a>

            <a href="https://www.facebook.com/share/14b8FDZypRP/" target="_blank" class="social-card block bg-slate-950/50 border border-slate-900 p-5 rounded-2xl flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-blue-700 flex items-center justify-center text-white text-xl shrink-0">
                        <i class="fab fa-facebook-f"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg text-white leading-tight">Facebook</h3>
                        <p class="text-sky-400 text-xs mt-0.5">/codinghub</p>
                    </div>
                </div>
                <span class="text-sky-400 flex items-center gap-1 text-xs font-medium">
                    Visit <i class="fas fa-arrow-up-right-from-square text-[10px]"></i>
                </span>
            </a>

            <a href="https://www.instagram.com/codinghub_024?igsh=ODR4OXM2NDFuZGw1" target="_blank" class="social-card block bg-slate-950/50 border border-slate-900 p-5 rounded-2xl flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-gradient-to-tr from-yellow-500 via-red-500 to-purple-600 flex items-center justify-center text-white text-xl shrink-0">
                        <i class="fab fa-instagram"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg text-white leading-tight">Instagram</h3>
                        <p class="text-sky-400 text-xs mt-0.5">@codinghub_024</p>
                    </div>
                </div>
                <span class="text-sky-400 flex items-center gap-1 text-xs font-medium">
                    Visit <i class="fas fa-arrow-up-right-from-square text-[10px]"></i>
                </span>
            </a>

        </div>
    </section>

    <footer class="border-t border-gray-900 py-8 text-center text-xs text-gray-500">
        &copy; 2026 CodingHub. All rights reserved.
    </footer>

    <script src="script.js"></script>
</body>
</html>
